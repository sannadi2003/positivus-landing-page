<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles/style.css" />
    <link rel="stylesheet" href="./styles/general.css" />
    <link rel="icon" href="/assets/Icon.png"
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <title>Positivus</title>
  </head>
  <body>

    <!-- NAV MENU -->
    <header class="header-menu">
      <img class="logo-img" src="./assets/logo.png" alt="positivus-logo" />
      <nav class="header-nav">
        <ul class="nav-list">
          <li><a class="nav-item" href="#">About us</a></li>
          <li><a class="nav-item" href="#">Services</a></li>
          <li><a class="nav-item" href="#">Use Cases</a></li>
          <li><a class="nav-item" href="#">Prices</a></li>
          <li><a class="nav-item" href="#">Blog</a></li>
          <button class="btn-outline">Request a quote</button>
        </ul>
      </nav>
    </header>

    <!-- HERO SECTION -->
    <section class="hero-section"> 
      <div class="hero">
      <div class="hero-text-box">
        <h1 class="hero-heading">Navigating the digital landscape for success</h1>
        <p class="hero-text">Our digital marketing agency helps businesses grow and succeed online through a range of services including SEO, PPC, social media marketing, and content creation.</p>
        <button class="btn-consultation">Book a consultation</button>
      </div> 
      <img class="hero-img" src="./assets/Illustration.png" alt="img of a comercial speaker">
    </div>

      <div class="features-row">
        <img src="./assets/Company logo.png" alt="">
        <img src="./assets/Company logo (1).png" alt="">
        <img src="./assets/Company logo (2).png" alt="">
        <img src="./assets/Company logo (3).png" alt="">
        <img src="./assets/Company logo (4).png" alt="">
        <img src="./assets/Company logo (5).png" alt="">
      </div>
    </section>
  </body>
</html>
